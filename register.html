<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Torisom</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1><i class="fas fa-compass"></i> Torisom</h1>
        <p>Create your account</p>
      </div>
      <div id="auth-message" class="auth-message" style="display:none;"></div>
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="name"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password (min 6 chars)" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="confirm-password"><i class="fas fa-lock"></i> Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn-primary"><i class="fas fa-user-plus"></i> Register</button>
      </form>
      <div id="otp-section" style="display:none;">
        <div class="otp-card">
          <h3><i class="fas fa-shield-alt"></i> Verify Your Email</h3>
          <p>We sent an OTP to your email. Enter it below to activate your account.</p>
          <div class="form-group">
            <label for="otp"><i class="fas fa-key"></i> Enter OTP</label>
            <input type="text" id="otp" name="otp" placeholder="6-digit OTP" maxlength="6" required>
          </div>
          <button id="verify-otp-btn" class="btn-primary" type="button"><i class="fas fa-check-circle"></i> Verify</button>
          <button id="resend-otp-btn" class="btn-secondary" type="button"><i class="fas fa-redo"></i> Resend OTP</button>
        </div>
      </div>
      <div class="auth-footer">
        <p>Already have an account? <a href="/login">Sign in</a></p>
        <p><a href="/">Back to Home</a></p>
      </div>
    </div>
  </div>
  <script>
    const API = (window.location.origin === 'null' || window.location.origin.startsWith('file') || window.location.port === '5500' || window.location.port === '5501') ? 'http://127.0.0.1:3000/api' : window.location.origin + '/api';
    const form = document.getElementById('register-form');
    const msg = document.getElementById('auth-message');
    const otpSection = document.getElementById('otp-section');
    let verificationToken = '';

    function showMessage(text, type = 'error') {
      msg.textContent = text;
      msg.className = 'auth-message ' + type;
      msg.style.display = 'block';
    }

    function completeLogin(user, token) {
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(user));
      if (user.role === 'admin') window.location.href = '/admin-dashboard';
      else window.location.href = '/user-dashboard';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.style.display = 'none';
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (password !== confirm) { showMessage('Passwords do not match.'); return; }
      try {
        const res = await fetch(API + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password }) });
        const data = await res.json();
        if (res.ok) {
          verificationToken = data.verificationToken;
          showMessage('Registration successful! Please verify your email with the OTP.', 'success');
          form.style.display = 'none'; otpSection.style.display = 'block';
        } else { showMessage(data.error || 'Registration failed.'); }
      } catch (err) { showMessage('Connection error.'); }
    });

    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
      const otp = document.getElementById('otp').value.trim();
      if (!otp || otp.length < 6) {
        showMessage('Please enter a valid 6-digit OTP.');
        return;
      }

      try {
        const res = await fetch(API + '/auth/verify-otp', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + verificationToken
          },
          body: JSON.stringify({ otp })
        });
        const data = await res.json();
        if (res.ok) {
          completeLogin(data.user, data.token);
        } else {
          showMessage(data.error || 'Verification failed.');
        }
      } catch (err) { showMessage('Verification failed.'); }
    });

    document.getElementById('resend-otp-btn').addEventListener('click', async () => {
      try {
        const res = await fetch(API + '/auth/resend-otp', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + verificationToken }
        });
        const data = await res.json();
        if (res.ok) {
          showMessage('OTP resent successfully. Check your email.', 'success');
        } else {
          showMessage(data.error || 'Failed to resend OTP.');
        }
      } catch (err) {
        showMessage('Failed to resend OTP.');
      }
    });
  </script>
</body>
</html>
